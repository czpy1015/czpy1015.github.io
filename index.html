<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作业展示页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            min-height: 100vh;
            /* 你截图里的森林公路背景，直接用稳定的图片地址 */
            background: url("https://images.unsplash.com/photo-1477346611705-65d1883cee1e?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80") no-repeat center center fixed;
            background-size: cover;
        }

        /* 左上角学号样式，和你截图保持一致 */
        .student-id {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 18px;
            color: #fff;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.6);
            z-index: 10;
        }

        /* 居中容器 */
        .center-box {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* 半透明卡片 */
        .card {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 30px 40px;
            text-align: center;
        }

        .card h2 {
            color: #ffdd44;
            font-size: 22px;
            margin-bottom: 25px;
        }

        /* 作业链接列表 */
        .card a {
            display: block;
            color: #fff;
            text-decoration: none;
            font-size: 18px;
            margin: 18px 0;
            transition: all 0.3s ease;
        }

        .card a:hover {
            color: #ffdd44;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <!-- 你的学号 -->
    <div class="student-id">学号:25061020203x</div>

    <!-- 居中作业列表 -->
    <div class="center-box">
        <div class="card">
            <h2>课程作业列表</h2>
            <a href="#">作业1.</a>
            <a href="#">作业2</a>
            <a href="#">作业3</a>
            <a href="#">作业4</a>
            <a href="#">作业5</a>
        </div>
    </div>
</body>
</html>
