<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作业列表</title>
<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Microsoft Yahei", sans-serif;
  }
  body{
    min-height:100vh;
    background: #1a2a38;
    background-image: linear-gradient(to top, #0f2027, #203a43, #2c5364);
  }
  .student-id{
    position: absolute;
    top: 20px;
    left: 20px;
    color: #fff;
    font-size: 22px;
    font-weight: bold;
  }
  .box{
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255,255,255,0.85);
    padding: 35px 30px;
    border-radius: 12px;
    min-width: 320px;
  }
  .box h2{
    text-align: center;
    margin-bottom: 20px;
  }
  .box li{
    list-style: none;
    margin: 12px 0;
  }
  .box a{
    display: block;
    padding: 12px;
    background: #333;
    color: #fff;
    text-align: center;
    text-decoration: none;
    border-radius: 6px;
  }
</style>
</head>
<body>
  <div class="student-id">学号：25061020203</div>
  <div class="box">
    <h2>作业列表</h2>
    <ul>
      <li><a href="E:\git-demo\作业北京照片 ">作业1</a ></li>
      
    </ul>
  </div>
</body>
</html>
